name: Bug report
description: Something isn't working in a public open-source repository
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        This form is for bug reports in public open-source repositories only.

        **Do not submit:**
        - security vulnerabilities (follow the repository SECURITY.md instead)
        - credentials, tokens, secrets, or private keys
        - customer or tenant data
        - production identifiers
        - private logs or trace output
        - exploit payloads
  - type: checkboxes
    id: safe_content
    attributes:
      label: Content confirmation
      options:
        - label: This report contains no security vulnerabilities, credentials, customer data, production identifiers, private logs, or exploit payloads.
          required: true
  - type: input
    id: version
    attributes:
      label: Version/commit
      placeholder: e.g., v0.1.0 or abc1234
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Clear steps that reproduce the bug
      placeholder: 1) … 2) …
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs (if any)
  - type: textarea
    id: context
    attributes:
      label: Environment
      placeholder: OS, runtime or tool versions, and container runtime if relevant
